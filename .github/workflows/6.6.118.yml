name: "oneplus13 内核编译"

env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android16'
  KERNEL_VERSION: '6.6'
  SUB_VERSION: 'latest'
  KERNEL_NAME: 'android16-6.6-latest-4k'
  CCACHE_KEY: ccache-ecsv3-6.6-latest

on:
  workflow_dispatch:
    inputs:
      runner_type:
        description: '编译节点'
        required: true
        type: choice
        default: 'self-hosted' 
        options:
          - 'self-hosted'
          - 'ubuntu-latest'
      ksu_type:
        description: 'KernelSU分支'
        required: true
        type: choice
        default: 'ksu'
        options:
          - 'resukisu'
          - 'sukisu'
          - 'ksunext'
          - 'ksu'
          - 'none'
      susfs_enable:
        description: '是否开启susfs'
        required: true
        type: boolean
        default: false
      kpm_enable:
        description: '是否开启kpm'
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'builtin'
          - 'kpn'
      lz4_enable:
        description: '是否安装 lz4 1.10.0+zstd 1.5.7 补丁'
        required: true
        type: boolean
        default: true
      lz4kd_enable:
        description: '是否安装 LZ4KD 补丁'
        required: true
        type: boolean
        default: false
      bbrv3_enable:
        description: 'BBRv3 TCP拥塞控制'
        required: true
        type: boolean
        default: true
      droidspaces_enable:
        description: '是否启用Droidspaces容器支持'
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'standard'
          - 'extend'
      better_net:
        description: '是否开启网络功能拓展配置'
        required: true
        type: boolean
        default: true
      adios_enable:
        description: '是否启用ADIOS IO调度器支持'
        required: true
        type: boolean
        default: true
      rekernel_enable:
        description: '是否启用Re-Kernel支持'
        required: true
        type: boolean
        default: false
      baseband_guard:
        description: '是否开启基带保护'
        required: true
        type: boolean
        default: false
      rcu_nocb_enable:
        description: '开启 RCU_NOCB_CPU (减少软中断抢占UI线)'
        required: true
        type: boolean
        default: true
      ccache_update:
        description: '更新ccache缓存'
        required: true
        type: boolean
        default: false
      ccache_debug:
        description: '是否上传 Ccache调试日志'
        required: true
        type: boolean
        default: false
      kernel_suffix:
        description: '内核后缀'
        required: false
        type: string
        default: ''
      diagnosis:
        description: '诊断模式：仅生成并导出config (默认关闭，启用时不编译镜像)'
        required: true
        type: boolean
        default: false
      upstream_merge:
        description: '是否合并上游最新6.6内核补丁'
        required: true
        type: boolean
        default: true
      hz_300:
        description: 'HZ=300'
        required: true
        type: boolean
        default: true
      o3_selective:
        description: '选择性-O3'
        required: true
        type: boolean
        default: true

jobs:
  build:
    runs-on: ${{ inputs.runner_type }}
    timeout-minutes: 180
    outputs:
      ksuver: ${{ steps.ksu_version.outputs.ksuver }}
      ak3name: ${{ steps.create_zip.outputs.ak3name }}
      sub_version: ${{ steps.init_env.outputs.sub_version }}
      kernel_name: ${{ steps.init_env.outputs.kernel_name }}
    permissions:
      actions: write
      contents: write
    steps:
      - name: 安装环境依赖+初始化源码仓库及llvm-Clang19工具链
        id: init_env
        run: |
          export GIT_TERMINAL_PROMPT=0
          LOG_FILE="$GITHUB_WORKSPACE/build_summary.log"
          echo "=== 内核构建关键状态日志汇总 ===" > "$LOG_FILE"
          echo "[INFO] 清理可能残留的后台进程"
          pkill -9 -f "kernel_workspace" || true
          sleep 1
          echo "[INFO] 修复Git大小写敏感"
          git config core.ignorecase false || true
          echo "[INFO] 仓库：$GITHUB_REPOSITORY" | tee -a "$LOG_FILE"
          echo "[INFO] 分支：$GITHUB_REF_NAME" | tee -a "$LOG_FILE"
          cd "$GITHUB_WORKSPACE"
          mkdir -p kernel_workspace
          cd kernel_workspace

          if [[ "${{ inputs.runner_type }}" == "ubuntu-latest" ]]; then
            echo "[INFO] 检测到 GitHub 云端环境，执行系统依赖安装及预置优化..."
            sudo apt-mark hold firefox || true
            sudo apt-mark hold libc-bin || true
            sudo apt purge -y man-db || true
            sudo rm -rf /var/lib/man-db/auto-update
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              binutils python-is-python3 libssl-dev libelf-dev aria2
          else
            echo "[INFO] 检测到 本地 self-hosted (WSL2) 环境，跳过危险修改..." | tee -a "$LOG_FILE"
            for pkg in binutils python3 libssl-dev libelf-dev aria2 zip zstd libxml2-dev; do
              if ! dpkg -l "$pkg" >/dev/null 2>&1 && ! command -v "$pkg" >/dev/null 2>&1; then
                echo "[WARN] 缺少依赖: $pkg，尝试安装..."
                sudo apt-get install -y --no-install-recommends "$pkg" || {
                  echo "[ERROR] 依赖 $pkg 安装失败，请手动安装" | tee -a "$LOG_FILE"
                  exit 1
                }
              fi
            done
          fi

          if ! command -v ccache >/dev/null 2>&1; then
            echo "[INFO] ccache 未安装，正在下载..."
            wget -q https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/ccache-x86-64 -O ccache
            sudo cp -f ./ccache /usr/bin/ccache
            sudo chmod +x /usr/bin/ccache
            rm -f ./ccache
            echo "[INFO] ccache 已安装到 /usr/bin/ccache"
          else
            echo "[INFO] ccache 已存在: $(ccache --version | head -1)"
          fi


          SKIP_UPSTREAM_MERGE=false
          MERGE_BRANCH=""
          if [[ "${{ inputs.upstream_merge }}" == "true" ]]; then
            echo "[INFO] 获取 6.6 LTS 最新 tag..."
            LATEST_TAG=$(git ls-remote --tags --sort=-v:refname \
              https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git \
              'refs/tags/v6.6.*' 2>/dev/null \
              | grep -v '\^{}' | head -1 | awk -F'/' '{print $NF}')

            if [ -z "$LATEST_TAG" ]; then
              echo "[ERROR] 无法从 kernel.org 获取 v6.6 tag" | tee -a "$LOG_FILE"
              exit 1
            fi

            UPSTREAM_MARKER="$HOME/.cache_patches/upstream_tag_done"
            mkdir -p "$HOME/.cache_patches"
            MERGE_BRANCH="merged-upstream-$LATEST_TAG"

            if [ -f "$UPSTREAM_MARKER" ] && [ "$(cat "$UPSTREAM_MARKER")" = "$LATEST_TAG" ]; then
              SKIP_UPSTREAM_MERGE=true
            fi
          fi

          if [ -d "common/.git" ]; then
            if [ "$SKIP_UPSTREAM_MERGE" = "true" ] && git -C common rev-parse "$MERGE_BRANCH" >/dev/null 2>&1; then
              echo "[INFO] [秒过] 本地源码已是最新上游 $LATEST_TAG，直接复用已合并状态" | tee -a "$LOG_FILE"
              cd common
              git reset --hard "$MERGE_BRANCH"
              git clean -fd
              cd ..
            else
              echo "[INFO] common 源码已存在，仅reset到OEM"
              cd common
              git fetch --depth=1 origin oneplus/sm8750_b_16.0.0_oneplus_13
              git reset --hard FETCH_HEAD
              git clean -fd
              cd ..
              SKIP_UPSTREAM_MERGE=false
            fi
          else
            echo "[INFO] 首次克隆 OEM 内核源码仓库..."
            git clone --depth=1 \
              https://github.com/OnePlusOSS/android_kernel_common_oneplus_sm8750.git \
              -b oneplus/sm8750_b_16.0.0_oneplus_13 \
              common
            SKIP_UPSTREAM_MERGE=false
          fi

          if [ -d "vendor_modules/.git" ]; then
            echo "[INFO] vendor_modules 已存在，仅更新..."
            cd vendor_modules
            git fetch --depth=1 origin oneplus/sm8750_b_16.0.0_oneplus_13
            git reset --hard FETCH_HEAD
            git clean -fd
            cd ..
          else
            echo "[INFO] 首次克隆设备树与私有驱动仓库..."
            git clone --depth=1 \
              https://github.com/OnePlusOSS/android_kernel_modules_and_devicetree_oneplus_sm8750.git \
              -b oneplus/sm8750_b_16.0.0_oneplus_13 \
              vendor_modules &
            wait
          fi

          cd common
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          if [[ "${{ inputs.upstream_merge }}" == "true" ]]; then
            git remote remove upstream 2>/dev/null || true
            git remote add upstream https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git

            echo "UPSTREAM_TAG=$LATEST_TAG" >> $GITHUB_ENV
            SUB_VER=$(echo "$LATEST_TAG" | sed -E 's/.*6\.6\.([0-9]+).*/\1/')
            echo "SUB_VERSION=$SUB_VER" >> $GITHUB_ENV
            KERNEL_NAME_VAL="android16-${LATEST_TAG}-4k"
            echo "KERNEL_NAME=$KERNEL_NAME_VAL" >> $GITHUB_ENV
            echo "sub_version=$SUB_VER" >> $GITHUB_OUTPUT
            echo "kernel_name=$KERNEL_NAME_VAL" >> $GITHUB_OUTPUT

            if [ "$SKIP_UPSTREAM_MERGE" = "true" ]; then
              echo "[INFO] [秒过] 跳过上游拉取与合并（标记匹配）" | tee -a "$LOG_FILE"
            else
              echo "[INFO] 拉取并合并上游 tag: $LATEST_TAG ..."
              git fetch --depth=1 upstream tag "$LATEST_TAG" || git fetch upstream "$LATEST_TAG"
              if git merge "$LATEST_TAG" --no-edit -X ours --allow-unrelated-histories; then
                echo "[INFO] 上游合并成功" | tee -a "$LOG_FILE"
              else
                echo "[WARN] 存在冲突，自动保留 OEM 版本..." | tee -a "$LOG_FILE"
                git diff --name-only --diff-filter=U | xargs -r git checkout --ours --
                git add -A
                git commit -m "Merge upstream $LATEST_TAG, keep OEM customizations" || true
                echo "[INFO] 冲突自动解决（OEM 优先）" | tee -a "$LOG_FILE"
              fi
              git branch -f "$MERGE_BRANCH" HEAD
              echo "$LATEST_TAG" > "$UPSTREAM_MARKER"
            fi
          else
            echo "[INFO] 跳过上游合并，使用 OEM 源码" | tee -a "$LOG_FILE"
            echo "UPSTREAM_TAG=none" >> $GITHUB_ENV
            OEM_SUBLEVEL=$(sed -n 's/^SUBLEVEL\s*=\s*\([0-9]*\).*/\1/p' common/Makefile)
            OEM_SUBLEVEL=${OEM_SUBLEVEL:-89}
            echo "SUB_VERSION=$OEM_SUBLEVEL" >> $GITHUB_ENV
            KERNEL_NAME_VAL="android16-6.6.${OEM_SUBLEVEL}-4k"
            echo "KERNEL_NAME=$KERNEL_NAME_VAL" >> $GITHUB_ENV
            echo "sub_version=$OEM_SUBLEVEL" >> $GITHUB_OUTPUT
            echo "kernel_name=$KERNEL_NAME_VAL" >> $GITHUB_OUTPUT
          fi

          cd ..

         
          # 恢复原始的 Clang 19 参数
          CLANG_DIR_NAME="Clang-19.0.0git-20240723"
          CLANG_URL="https://github.com/ZyCromerZ/Clang/releases/download/19.0.0git-20240723-release/Clang-19.0.0git-20240723.tar.gz"

          TC_DIR="$HOME/.toolchains/$CLANG_DIR_NAME"
          BT_DIR="$HOME/.toolchains/build-tools-r510928"
          mkdir -p "$HOME/.toolchains"

          if [ ! -d "$TC_DIR/bin" ]; then
            echo "[INFO] 检测到 Clang 19 未缓存或版本更新，开始下载..."
            rm -rf "$TC_DIR"
            mkdir -p "$TC_DIR"
            aria2c -s16 -x16 -k1M "$CLANG_URL" -o clang19.tar.gz
            tar -xzf clang19.tar.gz -C "$TC_DIR" && rm -f clang19.tar.gz
          else
            echo "[INFO] [秒过] Clang 19 工具链已存在本地缓存，直接复用！"
          fi
          
          if [ ! -d "$BT_DIR/bin" ]; then
            echo "[INFO] 检测到 build-tools 未缓存，开始下载..."
            mkdir -p "$BT_DIR"
            aria2c -s16 -x16 -k1M \
              https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/build-tools.zip \
              -o build-tools.zip
            unzip -q build-tools.zip -d "$BT_DIR" && rm -f build-tools.zip
          else
            echo "[INFO] [秒过] build-tools 工具链已存在本地缓存，直接复用！"
          fi

          if [[ "${{ inputs.runner_type }}" == "ubuntu-latest" ]]; then
            if ! dpkg -l binutils python3 libssl-dev libelf-dev >/dev/null 2>&1; then
              echo "[WARN] 云端依赖安装异常，正在重试..."
              sudo apt-get install -y --no-install-recommends \
                binutils python-is-python3 libssl-dev libelf-dev || {
                echo "[ERROR] 云端依赖安装失败" | tee -a "$LOG_FILE"
                exit 1
              }
            fi
          fi
          rm -f common/android/abi_gki_protected_exports_* || true
          sed -i 's/protected_modules = \[.*\]/protected_modules = []/' common/modules.bzl || true
          for f in common/scripts/setlocalversion; do
            sed -i 's/ -dirty//g' "$f"
            sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"
          done
          echo "[INFO] 源码及工具链初始化完成" | tee -a "$LOG_FILE"
      - name: 配置ccache目录
        run: |
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=40G" >> $GITHUB_ENV
          df -h
          if [[ "${{ inputs.droidspaces_enable }}" != "false" ]]; then
            CCACHE_REAL_KEY="${{ env.CCACHE_KEY }}-${{ env.SUB_VERSION }}-Droidspaces"
          else
            CCACHE_REAL_KEY="${{ env.CCACHE_KEY }}-${{ env.SUB_VERSION }}-none"
          fi
          echo "CCACHE_REAL_KEY=$CCACHE_REAL_KEY" >> $GITHUB_ENV

      - name: 载入当前版本内核的 ccache缓存
        if: inputs.runner_type == 'ubuntu-latest'
        uses: actions/cache@v5
        id: ccache-restore
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_REAL_KEY }}-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            ${{ env.CCACHE_REAL_KEY }}-${{ runner.os }}-
            ${{ env.CCACHE_REAL_KEY }}-

      - name: 拉取公共预置 ccache 缓存
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LOG_FILE="$GITHUB_WORKSPACE/build_summary.log"
          if [ -d "${{ env.CCACHE_DIR }}" ] && [ "$(ls -A ${{ env.CCACHE_DIR }} 2>/dev/null)" ]; then
            echo "[INFO] 检测到本地 ccache 缓存，跳过公共 ccache 拉取" | tee -a "$LOG_FILE"
            exit 0
          fi

          mkdir -p ${{ env.CCACHE_DIR }}
          if [[ "${{ inputs.droidspaces_enable }}" != "false" ]]; then
            FILE_NAME="ccache-${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}-Droidspaces.tar.zst"
          else
            FILE_NAME="ccache-${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}.tar.zst"
          fi

          if gh release download -p "$FILE_NAME" -R cctv18/public_ccache; then
            echo "[INFO] 解压 $FILE_NAME ..."
            tar -I zstd -xf "$FILE_NAME" -C ${{ env.CCACHE_DIR }}
            echo "[INFO] 公共 ccache 恢复完成" | tee -a "$LOG_FILE"
          else
            echo "[INFO] 未找到公共 ccache，进行全新编译" | tee -a "$LOG_FILE"
          fi

      - name: 清除旧 ccache 缓存
        if: inputs.ccache_update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh cache delete ${{ env.CCACHE_REAL_KEY }}-${{ runner.os }}-${{ github.ref_name }} -R ${{ github.repository }}; then
            echo "[INFO] 旧 ccache 缓存删除成功"
          else
            echo "[INFO] 旧 ccache 清理跳过"
          fi

      - name: 初始化并配置ccache
        run: |
          echo "CCACHE_DIR=${{ env.CCACHE_DIR }}" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=${{ env.CCACHE_MAXSIZE }}" >> $GITHUB_ENV
          echo "CCACHE_BASEDIR=${{ github.workspace }}" >> $GITHUB_ENV
          echo "CCACHE_COMPILERCHECK=content" >> $GITHUB_ENV
          echo "CCACHE_NOHASHDIR=true" >> $GITHUB_ENV
          echo "CCACHE_NOHARDLINK=true" >> $GITHUB_ENV
          echo "CCACHE_DIRECT=true" >> $GITHUB_ENV
          echo "CCACHE_FILE_CLONE=true" >> $GITHUB_ENV
          echo "CCACHE_INODE_CACHE=true" >> $GITHUB_ENV
          echo "CCACHE_COMPRESSION=true" >> $GITHUB_ENV
          echo "CCACHE_COMPRESSION_LEVEL=3" >> $GITHUB_ENV
          echo "CCACHE_UMASK=002" >> $GITHUB_ENV
          echo "CCACHE_IS_KERNEL_COMPILING=true" >> $GITHUB_ENV
          echo "CCACHE_IGNOREOPTIONS=--sysroot*" >> $GITHUB_ENV
          echo "CCACHE_SLOPPINESS=file_macro,time_macros,include_file_mtime,include_file_ctime,pch_defines,system_headers,locale" >> $GITHUB_ENV
          echo "CCACHE_LOGFILE=${{ github.workspace }}/kernel_workspace/ccache.log" >> $GITHUB_ENV
          if ccache --help 2>&1 | grep -q 'depend_mode'; then 
            echo "CCACHE_DEPEND=true" >> $GITHUB_ENV
          fi

          mkdir -p "${{ env.CCACHE_DIR }}"
          ccache -M "${{ env.CCACHE_MAXSIZE }}"
          ccache -o compression=true
          echo "sloppiness = file_macro,time_macros,include_file_mtime,include_file_ctime,pch_defines,system_headers,locale" >> "${{ env.CCACHE_DIR }}/ccache.conf"

          echo "[INFO] ccache 状态:"
          ccache -s
          if [ "${{ steps.ccache-restore.outputs.cache-hit }}" == 'true' ]; then
            ccache -sv
          fi

      - name: 添加KernelSU
        id: ksu_version
        run: |
          LOG_FILE="$GITHUB_WORKSPACE/build_summary.log"
          cd kernel_workspace
          rm -rf KernelSU KernelSU-Next KernelSU-Next-dev common/drivers/kernelsu
          
          if [[ '${{ inputs.ksu_type }}' == "sukisu" || '${{ inputs.ksu_type }}' == "resukisu" ]]; then
            echo "[INFO] 配置 ReSukiSU..." | tee -a "$LOG_FILE"
            curl -fSL "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/refs/heads/main/kernel/setup.sh" | bash -s main || {
              echo "[ERROR] ReSukiSU 安装失败" | tee -a "$LOG_FILE"
              exit 1
            }
            echo 'CONFIG_KSU_FULL_NAME_FORMAT="%TAG_NAME%-%COMMIT_SHA%@cctv18"' >> ./common/arch/arm64/configs/gki_defconfig
            cd ./KernelSU
            KSU_VERSION=$(expr $(git rev-list --count main) + 30700 2>/dev/null || echo 0)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
          elif [[ '${{ inputs.ksu_type }}' == "ksunext" ]]; then
            echo "[INFO] 配置 KernelSU Next..." | tee -a "$LOG_FILE"
            curl -fSL "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/dev-susfs/kernel/setup.sh" | bash -s dev-susfs || {
              echo "[ERROR] KernelSU Next 安装失败" | tee -a "$LOG_FILE"
              exit 1
            }
            cd KernelSU-Next
            rm -rf .git
                        KSU_COMMITS=$(curl -sI --retry 3 --retry-delay 5 "https://api.github.com/repos/pershoot/KernelSU-Next/commits?sha=dev&per_page=1" | grep -i "link:" | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p')
            KSU_COMMITS=${KSU_COMMITS:-0}
            KSU_VERSION=$(expr "$KSU_COMMITS" + 30000)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
            sed -i "s/KSU_VERSION_FALLBACK := 1/KSU_VERSION_FALLBACK := $KSU_VERSION/g" kernel/Kbuild
            KSU_GIT_TAG=$(curl -sL "https://api.github.com/repos/KernelSU-Next/KernelSU-Next/tags" | grep -o '"name": *"[^"]*"' | head -n 1 | sed 's/"name": "//;s/"//')
            sed -i "s/KSU_VERSION_TAG_FALLBACK := v0.0.1/KSU_VERSION_TAG_FALLBACK := $KSU_GIT_TAG/g" kernel/Kbuild
            cd ../common/drivers/kernelsu
            curl -fSL -o apk_sign.patch "https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/other_patch/apk_sign.patch"
            patch -p2 -N -F 3 < apk_sign.patch || true
          elif [[ '${{ inputs.ksu_type }}' == "ksu" ]]; then
            echo "[INFO] 配置原版 KernelSU..." | tee -a "$LOG_FILE"
            curl -fSL "https://raw.githubusercontent.com/tiann/KernelSU/refs/heads/main/kernel/setup.sh" | bash -s main || {
              echo "[ERROR] 原版 KernelSU 安装失败" | tee -a "$LOG_FILE"
              exit 1
            }
            cd ./KernelSU
                        KSU_COMMITS=$(curl -sI --retry 3 --retry-delay 5 "https://api.github.com/repos/tiann/KernelSU/commits?sha=main&per_page=1" | grep -i "link:" | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p')
            KSU_COMMITS=${KSU_COMMITS:-0}
            KSU_VERSION=$(expr "$KSU_COMMITS" + 30000)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
            sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" kernel/Kbuild
          else
            echo "[INFO] 跳过 KernelSU 配置" | tee -a "$LOG_FILE"
            echo "KSUVER=none" >> $GITHUB_ENV
            echo "ksuver=none" >> $GITHUB_OUTPUT
          fi

      - name: 应用 KernelSU & SUSFS 补丁
        if: inputs.susfs_enable
        run: |
          LOG_FILE="$GITHUB_WORKSPACE/build_summary.log"
          cd kernel_workspace
          if [[ '${{ inputs.ksu_type }}' != "none" ]]; then
            echo "[INFO] 添加 susfs 补丁..." | tee -a "$LOG_FILE"

            # --- 1. SUSFS 补丁仓本地持久化与增量更新 ---
            SUSFS_CACHE_DIR="$HOME/.cache_patches/susfs4ksu"
            BRANCH_NAME="oki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}"
            mkdir -p "$HOME/.cache_patches"

            if [ -d "$SUSFS_CACHE_DIR/.git" ]; then
              echo "[INFO] [秒过] SUSFS 补丁仓已存在本地，增量同步上游..." | tee -a "$LOG_FILE"
              git -C "$SUSFS_CACHE_DIR" fetch --depth=1 origin "$BRANCH_NAME" || true
              git -C "$SUSFS_CACHE_DIR" reset --hard FETCH_HEAD || true
            else
              echo "[INFO] 首次克隆 SUSFS 补丁仓..." | tee -a "$LOG_FILE"
              git clone --depth=1 https://github.com/cctv18/susfs4oki.git "$SUSFS_CACHE_DIR" -b "$BRANCH_NAME"
            fi

            # --- 2. 清理工作区残留并复制最新补丁 ---
            rm -rf susfs4ksu
            cp -r "$SUSFS_CACHE_DIR" susfs4ksu

            # --- 3. 缓存 69_hide_stuff.patch 避免重复网络下载 ---
            HIDE_PATCH="$HOME/.cache_patches/69_hide_stuff.patch"
            if [ ! -f "$HIDE_PATCH" ]; then
              curl -fSL -o "$HIDE_PATCH" "https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/other_patch/69_hide_stuff.patch"
            fi
            cp "$HIDE_PATCH" ./common/69_hide_stuff.patch

            # 拷贝 SUSFS 关键源码文件到内核目录
            cp ./susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch ./common/
            cp ./susfs4ksu/kernel_patches/fs/* ./common/fs/
            cp ./susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
            
            cd ./common
            
            # 预处理 task_mmu.c 防止补丁偏移报错
            sed -i -e '/int ret = 0, copied = 0;/a \    unsigned int nr_subpages = __PAGE_SIZE / PAGE_SIZE;' -e '/int ret = 0, copied = 0;/a \    pagemap_entry_t *res = NULL;' ./fs/proc/task_mmu.c || true

            patch -p1 < 50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch || {
              echo "[ERROR] SUSFS 核心补丁应用失败" | tee -a "$LOG_FILE"
              exit 1
            }

            sed -i -e '/unsigned int nr_subpages = __PAGE_SIZE \/ PAGE_SIZE;/d' -e '/pagemap_entry_t \*res = NULL;/d' ./fs/proc/task_mmu.c || true

            patch -p1 -N -F 3 < 69_hide_stuff.patch || true
            cd ..
          else
            echo "[INFO] 跳过 susfs 配置（未选择 KernelSU）" | tee -a "$LOG_FILE"
          fi

          if [[ '${{ inputs.ksu_type }}' == "ksu" ]]; then
            echo "[INFO] 为原版 KernelSU 添加补丁..." | tee -a "$LOG_FILE"
            cp ./susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./KernelSU/
            cd ./KernelSU
            patch -p1 < 10_enable_susfs_for_ksu.patch || true
          fi
      - name: 应用lz4/zstd
        if: inputs.lz4_enable
        run: |
          cd kernel_workspace/common
          CACHE_DIR="$HOME/.cache_patches/zram_patches"
          mkdir -p "$HOME/.cache_patches"

          if [ -d "$CACHE_DIR/.git" ]; then
            echo "[INFO] [秒过] 本地 LZ4 补丁仓增量更新..."
            git -C "$CACHE_DIR" fetch --depth=1 origin main || true
            git -C "$CACHE_DIR" reset --hard FETCH_HEAD || true
          else
            echo "[INFO] 克隆 LZ4 补丁仓..."
            git clone --depth=1 https://github.com/mrcxlinux/kernel_patches.git "$CACHE_DIR"
          fi

          cp "$CACHE_DIR/zram/001-lz4.patch" . || exit 1
          cp "$CACHE_DIR/zram/002-zstd.patch" . || exit 1

          mkdir -p lib/lz4/lz4armv8
          cp "$CACHE_DIR/zram/lz4armv8.S" lib/lz4/lz4armv8/lz4armv8.S || true

          ACCEL_DIR="$HOME/.cache_patches/lz4accel"
          mkdir -p "$ACCEL_DIR"
          if [ ! -f "$ACCEL_DIR/lz4accel.c" ]; then
            wget -q -O "$ACCEL_DIR/lz4accel.c" "https://raw.githubusercontent.com/palazik/android_kernel_common_oneplus_sm8750/6.6.142_oneplus13_coloros16/fs/f2fs/lz4armv8/lz4accel.c"
            wget -q -O "$ACCEL_DIR/lz4accel.h" "https://raw.githubusercontent.com/palazik/android_kernel_common_oneplus_sm8750/6.6.142_oneplus13_coloros16/fs/f2fs/lz4armv8/lz4accel.h"
          fi
          mkdir -p fs/f2fs/lz4armv8
          cp "$ACCEL_DIR/lz4accel.c" fs/f2fs/lz4armv8/
          cp "$ACCEL_DIR/lz4accel.h" fs/f2fs/lz4armv8/

          git apply --reject --whitespace=nowarn 001-lz4.patch || true
          patch -p1 -t -F 3 < 002-zstd.patch || true
      - name: 应用lz4kd
        if: inputs.lz4kd_enable
        run: |
          cd kernel_workspace/common
          CACHE_DIR="$HOME/.cache_patches/sukisu_patches"
          mkdir -p "$HOME/.cache_patches"

          if [ -d "$CACHE_DIR/.git" ]; then
            echo "[INFO] [秒过] 本地 LZ4KD 补丁仓增量更新..."
            git -C "$CACHE_DIR" fetch --depth=1 origin main || true
            git -C "$CACHE_DIR" reset --hard FETCH_HEAD || true
          else
            echo "[INFO] 克隆 LZ4KD 补丁仓..."
            git clone --depth=1 https://github.com/ShirkNeko/SukiSU_patch.git "$CACHE_DIR"
          fi

          cp -r "$CACHE_DIR/other/zram/lz4k/include/linux/"* ./include/linux/
          cp -r "$CACHE_DIR/other/zram/lz4k/lib/"* ./lib/
          cp -r "$CACHE_DIR/other/zram/lz4k/crypto/"* ./crypto/
          cp "$CACHE_DIR/other/zram/zram_patch/6.6/lz4kd.patch" ./
          patch -p1 -F 3 < lz4kd.patch || true

      - name: 配置核心扩展与通用优化
        run: |
          cd kernel_workspace
          DCFG="./common/arch/arm64/configs/gki_defconfig"

          if [[ "${{ inputs.susfs_enable }}" == "true" ]]; then
            cat >> $DCFG << 'SUSFSCFG'
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
