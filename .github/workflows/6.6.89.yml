name: "oneplus13 内核编译"

env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android16'
  KERNEL_VERSION: '6.6'
  SUB_VERSION: 'latest'  # 动态值，运行时由 init_env 步骤通过 kernel.org tag 覆盖
  KERNEL_NAME: 'android16-6.6-latest-4k'
  CCACHE_KEY: ccache-ecsv3-6.6-latest

concurrency:
  group: ${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: 'KernelSU分支(ReSukiSU/SukiSU Ultra/KernelSU Next/KSU(原版)/无内置KSU,默认KSU)'
        required: true
        type: choice
        default: 'ksu'
        options:
          - 'resukisu'
          - 'sukisu'
          - 'ksunext'
          - 'ksu'
          - 'none'
      susfs_enable:
        description: '是否开启susfs(用于增强隐藏环境挂载功能; 可能轻微增加耗电，上游更新导致不稳定时或不需要可关闭)'
        required: true
        type: boolean
        default: false
      kpm_enable:
        description: '是否开启kpm(builtin-使用(re)sukisu内置kpm, kpn-使用独立kpm实现(支持任意KSU/面具环境); 不需要可保持默认关闭)'
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'builtin'
          - 'kpn'
      lz4_enable:
        description: '是否安装 lz4 1.10.0+zstd 1.5.7 补丁'
        required: true
        type: boolean
        default: true
      lz4kd_enable:
        description: '是否安装 LZ4KD 补丁(若已开启lz4+zstd补丁则可不开启)'
        required: true
        type: boolean
        default: false
      bbr_enable:
        description: "是否启用bbr算法(优化上行数据;false关闭,true仅加入算法,default启用算法并设为默认)"
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'
          - 'default'
      droidspaces_enable:
        description: '是否启用Droidspaces容器支持(false关闭,standard开启容器+ntsync支持,extend开启更多测试支持项)'
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'standard'
          - 'extend'
      better_net:
        description: '是否开启网络功能拓展配置(用于为ipset及需要iptables等高级网络功能内核支持的程序提供支持)'
        required: true
        type: boolean
        default: true
      adios_enable:
        description: '是否启用ADIOS IO调度器支持(提升IO读写性能)'
        required: true
        type: boolean
        default: true
      rekernel_enable:
        description: '是否启用Re-Kernel支持(与Freezer/NoActive等软件配合, 提升应用冻结能力)'
        required: true
        type: boolean
        default: false
      baseband_guard:
        description: '是否开启内核级基带保护(阻止一切对非用户分区的写入，有效防止格机)'
        required: true
        type: boolean
        default: false
      rcu_nocb_enable:
        description: '开启 RCU_NOCB_CPU (减少软中断抢占UI线程;已通过验证)'
        required: true
        type: boolean
        default: true
      ccache_update:
        description: '更新ccache缓存(将本次编译生成的ccache缓存覆盖至仓库缓存)'
        required: true
        type: boolean
        default: false
      ccache_debug:
        description: '是否上传 Ccache调试日志(用于调试, 无需要不必开启)'
        required: true
        type: boolean
        default: false
      kernel_suffix:
        description: '内核后缀(留空默认,开头别加连字符,勿加空格等影响指令运行的保留字符)'
        required: false
        type: string
        default: ''
      diagnosis:
        description: '诊断模式：仅生成并导出 config 文本用于对比 (默认关闭，启用时不编译镜像)'
        required: true
        type: boolean
        default: false
      upstream_merge:
        description: '是否合并上游最新6.6内核补丁(关闭则使用OEM纯净89源码编译)'
        required: true
        type: boolean
        default: true


      hz_1000:
        description: 'HZ=1000'
        required: true
        type: boolean
        default: false



      bbrv3_enable:
        description: 'BBRv3 TCP拥塞控制'
        required: true
        type: boolean
        default: false

      o3_selective:
        description: '选择性-O3'
        required: true
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      ksuver: ${{ steps.ksu_version.outputs.ksuver }}
      ak3name: ${{ steps.create_zip.outputs.ak3name }}
      sub_version: ${{ steps.init_env.outputs.sub_version }}
      kernel_name: ${{ steps.init_env.outputs.kernel_name }}
    permissions:
      actions: write
      contents: read
    steps:
      - name: 安装环境依赖+初始化源码仓库及llvm-Clang18工具链
        id: init_env
        run: |
          rm -rf kernel_workspace
          mkdir kernel_workspace
          cd kernel_workspace
          echo "当前仓库：$GITHUB_REPOSITORY"
          echo "当前分支：$GITHUB_REF_NAME"

          sudo apt-mark hold firefox
          sudo apt-mark hold libc-bin
          sudo apt purge man-db
          sudo rm -rf /var/lib/man-db/auto-update
          sudo apt update
          sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev &

          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/ccache-x86-64 -O ccache &&
          sudo cp -f ./ccache /usr/bin/ccache &&
          sudo chmod +x /usr/bin/ccache &&
          rm -f ./ccache &

          echo "正在克隆 OEM 内核源码仓库..."
          git clone --depth=1 \
            https://github.com/OnePlusOSS/android_kernel_common_oneplus_sm8750.git \
            -b oneplus/sm8750_b_16.0.0_oneplus_13 \
            common

          cd common
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          if [[ "${{ github.event.inputs.upstream_merge }}" == "true" ]]; then
            git remote add upstream https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git
            echo "正在获取 kernel.org stable 最新 6.6 LTS tag..."
            LATEST_TAG=""
            for pattern in 'refs/tags/v6.6.*'; do
              echo "  尝试匹配模式: $pattern"
              LATEST_TAG=$(git ls-remote --tags --sort=-v:refname \
                https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git \
                "$pattern" 2>/dev/null \
                | grep -v '\^{}' \
                | head -1 | awk -F'/' '{print $NF}')
              if [ -n "$LATEST_TAG" ]; then
                echo "  ✅ 匹配成功: $LATEST_TAG"
                break
              fi
            done

            if [ -z "$LATEST_TAG" ]; then
              echo "❌ 错误：无法从 kernel.org stable 获取任何 v6.6 tag"
              exit 1
            fi

            echo "上游最新 tag: $LATEST_TAG"
            echo "UPSTREAM_TAG=$LATEST_TAG" >> $GITHUB_ENV
            SUB_VER=$(echo "$LATEST_TAG" | sed -E 's/.*6\.6\.([0-9]+).*/\1/')
            if [ -z "$SUB_VER" ] || [ "$SUB_VER" = "$LATEST_TAG" ]; then
              SUB_VER="unknown"
              echo "⚠️ 无法提取版本号，tag: $LATEST_TAG"
            fi
            echo "SUB_VERSION=$SUB_VER" >> $GITHUB_ENV
            echo "  提取的小版本号: $SUB_VER"

            KERNEL_NAME_VAL="android15-8-gxxx-linux-${LATEST_TAG}-4k"
            echo "KERNEL_NAME=$KERNEL_NAME_VAL" >> $GITHUB_ENV
            echo "sub_version=$SUB_VER" >> $GITHUB_OUTPUT
            echo "kernel_name=$KERNEL_NAME_VAL" >> $GITHUB_OUTPUT

            echo "正在拉取上游 tag: $LATEST_TAG ..."
            if git fetch --depth=1 upstream tag "$LATEST_TAG" 2>&1; then
              echo "✅ tag 拉取成功"
            else
              echo "⚠️ 浅获取失败，尝试完整获取..."
              git fetch upstream "$LATEST_TAG" || {
                echo "❌ 无法获取 tag: $LATEST_TAG"
                exit 1
              }
            fi

            echo "正在合并上游 $LATEST_TAG 到 OEM 分支..."
            if git merge "$LATEST_TAG" --no-edit -X ours --allow-unrelated-histories; then
              echo "✅ 合并成功，无冲突"
            else
              echo "⚠️ 存在冲突，自动保留 OEM 版本..."
              git diff --name-only --diff-filter=U > /tmp/conflicts.txt 2>/dev/null
              if [ -s /tmp/conflicts.txt ]; then
                echo "冲突文件列表："
                cat /tmp/conflicts.txt
                git diff --name-only --diff-filter=U | xargs -r git checkout --ours --
              fi
              git add -A
              git commit -m "Merge upstream $LATEST_TAG, keep OEM customizations" || true
              echo "✅ 冲突已自动解决（OEM 版本优先）"
            fi
          else
            echo "⚠️ 已跳过上游合并，使用 OEM 纯净 6.6.89 源码"
            echo "UPSTREAM_TAG=none" >> $GITHUB_ENV
            echo "SUB_VERSION=89" >> $GITHUB_ENV
            KERNEL_NAME_VAL="android15-8-gxxx-oneplus_13_6.6.89-4k"
            echo "KERNEL_NAME=$KERNEL_NAME_VAL" >> $GITHUB_ENV
            echo "sub_version=89" >> $GITHUB_OUTPUT
            echo "kernel_name=$KERNEL_NAME_VAL" >> $GITHUB_OUTPUT
          fi

          cd ..
          echo "正在克隆llvm-clang18工具链..." && mkdir -p clang18 &&
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/clang-r510928.zip -o clang.zip &&
          unzip -q clang.zip -d clang18 && rm -rf clang.zip &

          echo "正在克隆构建工具..." &&
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/build-tools.zip -o build-tools.zip &&
          unzip -q build-tools.zip && rm -rf build-tools.zip &

          wait
          if ! dpkg -l binutils python3 libssl-dev libelf-dev > /dev/null 2>&1; then
            echo "⚠️ 后台依赖安装异常，正在重试..."
            sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev || {
              echo "❌ 依赖安装失败"
              exit 1
            }
          fi
          echo "所有源码及llvm-Clang18工具链初始化完成！"
          echo "正在去除 ABI 保护 & 去除 dirty 后缀..."
          rm common/android/abi_gki_protected_exports_* || true
          for f in common/scripts/setlocalversion; do
            sed -i 's/ -dirty//g' "$f"
            sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"
          done

      - name: 配置ccache目录
        run: |
          echo "CCACHE_DIR=$HOME/.ccache_${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=5G" >> $GITHUB_ENV
          echo "当前磁盘空间："
          df -h
          echo "当前构建内核版本：${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}"
          if [[ "${{ github.event.inputs.droidspaces_enable }}" != "false" ]]; then
            CCACHE_REAL_KEY=${{ env.CCACHE_KEY }}-${SUB_VERSION}-Droidspaces
          else
            CCACHE_REAL_KEY=${{ env.CCACHE_KEY }}-${SUB_VERSION}-none
          fi
          echo "CCACHE_REAL_KEY=$CCACHE_REAL_KEY" >> $GITHUB_ENV

      - name: 载入当前版本内核的 ccache缓存
        uses: actions/cache@v5
        id: ccache-restore
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_REAL_KEY }}-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            ${{ env.CCACHE_REAL_KEY }}-${{ runner.os }}-
            ${{ env.CCACHE_REAL_KEY }}-

      - name: 拉取公共预置 ccache 缓存
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "检查本地缓存状态..."
          if [ -d "${{ env.CCACHE_DIR }}" ] && [ "$(ls -A ${{ env.CCACHE_DIR }} 2>/dev/null)" ]; then
            echo "检测到本地已成功载入 ccache 缓存，跳过公共 ccache 拉取！"
            exit 0
          fi

          echo "未命中缓存，尝试拉取最新公共 ccache ..."
          mkdir -p ${{ env.CCACHE_DIR }}
          if [[ "${{ github.event.inputs.droidspaces_enable }}" != "false" ]]; then
            FILE_NAME="ccache-${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}-Droidspaces.tar.zst"
          else
            FILE_NAME="ccache-${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}.tar.zst"
          fi

          if gh release download -p "$FILE_NAME" -R cctv18/public_ccache; then
            echo "成功下载 $FILE_NAME，正在解压..."
            tar -I zstd -xf "$FILE_NAME" -C ${{ env.CCACHE_DIR }}
            echo "公共 ccache 恢复完成！"
          else
            echo "公共 ccache 中未找到对应的 ccache 文件，将进行全量全新编译..."
          fi

      - name: 清除旧 ccache 缓存
        if: inputs.ccache_update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "正在清除仓库中的旧 ccache 缓存..."
          if gh cache delete ${{ env.CCACHE_REAL_KEY }}-${{ runner.os }}-${{ github.ref_name }} -R ${{ github.repository }}; then
            echo "成功删除旧的 ccache 缓存！"
          else
            echo "旧缓存不存在或已被清理！"
          fi

      - name: 初始化并配置ccache
        run: |
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_SLOPPINESS="file_stat_matches,include_file_mtime,include_file_ctime,time_macros"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_NOHARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="${{ env.CCACHE_MAXSIZE }}"

          mkdir -p "$CCACHE_DIR"
          echo "配置ccache缓存大小为: $CCACHE_MAXSIZE"
          ccache -M "$CCACHE_MAXSIZE"
          ccache -o compression=true
          echo "sloppiness = $CCACHE_SLOPPINESS" >> "$CCACHE_DIR/ccache.conf"

          echo "ccache初始状态:"
          ccache -s
          if [ "${{ steps.ccache-restore.outputs.cache-hit }}" == 'true' ]; then
            echo "ccache缓存命中详情:"
            ccache -sv
          fi

      - name: 添加KernelSU
        id: ksu_version
        run: |
          cd kernel_workspace
          if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" || ${{ github.event.inputs.ksu_type }} == "resukisu" ]]; then
            echo "正在配置ReSukiSU..."
            curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/refs/heads/main/kernel/setup.sh" | bash -s main
            echo 'CONFIG_KSU_FULL_NAME_FORMAT="%TAG_NAME%-%COMMIT_SHA%@cctv18"' >> ./common/arch/arm64/configs/gki_defconfig
            cd ./KernelSU
            KSU_VERSION=$(expr $(git rev-list --count main) + 30700 2>/dev/null || echo 0)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then
            echo "正在配置KernelSU Next..."
            curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/dev-susfs/kernel/setup.sh" | bash -s dev-susfs
            cd KernelSU-Next
            rm -rf .git
            KSU_VERSION=$(expr $(curl -sI "https://api.github.com/repos/pershoot/KernelSU-Next/commits?sha=dev&per_page=1" | grep -i "link:" | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p') "+" 30000)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
            sed -i "s/KSU_VERSION_FALLBACK := 1/KSU_VERSION_FALLBACK := $KSU_VERSION/g" kernel/Kbuild
            KSU_GIT_TAG=$(curl -sL "https://api.github.com/repos/KernelSU-Next/KernelSU-Next/tags" | grep -o '"name": *"[^"]*"' | head -n 1 | sed 's/"name": "//;s/"//')
            sed -i "s/KSU_VERSION_TAG_FALLBACK := v0.0.1/KSU_VERSION_TAG_FALLBACK := $KSU_GIT_TAG/g" kernel/Kbuild
            cd ../common/drivers/kernelsu
            wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/other_patch/apk_sign.patch
            patch -p2 -N -F 3 < apk_sign.patch || true
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            echo "正在配置原版 KernelSU..."
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/refs/heads/main/kernel/setup.sh" | bash -s main
            cd ./KernelSU
            KSU_VERSION=$(expr $(curl -sI "https://api.github.com/repos/tiann/KernelSU/commits?sha=main&per_page=1" | grep -i "link:" | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p') "+" 30000)
            echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
            echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
            sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" kernel/Kbuild
          else
            echo "已选择无内置KernelSU模式，跳过KernelSU配置..."
          fi

      - name: 应用 KernelSU & SUSFS 补丁
        if: inputs.susfs_enable
        run: |
          cd kernel_workspace
          if [[ ${{ github.event.inputs.ksu_type }} != "none" ]]; then
            echo "正在添加susfs补丁..."
            git clone --depth=1 https://github.com/cctv18/susfs4oki.git susfs4ksu -b oki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}
            wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/other_patch/69_hide_stuff.patch -O ./common/69_hide_stuff.patch
            cp ./susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch ./common/
            cp ./susfs4ksu/kernel_patches/fs/* ./common/fs/
            cp ./susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
            cd ./common
            patch -p1 < 50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch || echo "⚠️ SUSFS 核心补丁应用失败，SUSFS 功能将不可用"
            patch -p1 -N -F 3 < 69_hide_stuff.patch || true
            cd ..
          else
            echo "已选择无内置KernelSU模式，跳过susfs配置..."
          fi
          if [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            echo "正在为原版 KernelSU 添加补丁..."
            cp ./susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./KernelSU/
            cd ./KernelSU
            patch -p1 < 10_enable_susfs_for_ksu.patch || true
          fi

      - name: 应用lz4 1.10.0 & zstd 1.5.7补丁
        if: inputs.lz4_enable
        run: |
          echo "正在添加lz4 1.10.0 & zstd 1.5.7补丁…"
          cd kernel_workspace
          git clone --depth=1 https://github.com/$GITHUB_REPOSITORY.git -b $GITHUB_REF_NAME $GITHUB_ACTOR
          cp ./$GITHUB_ACTOR/zram_patch/001-lz4.patch ./common/
          cp ./$GITHUB_ACTOR/zram_patch/lz4armv8.S ./common/lib
          cp ./$GITHUB_ACTOR/zram_patch/002-zstd.patch ./common/
          cd ./common
          if git apply -p1 < 001-lz4.patch 2>/dev/null; then
            echo "✅ LZ4 1.10.0 + ARM64 NEON ASM 应用成功"
          else
            echo "⚠️ LZ4 patch 应用失败，回退到内核自带 LZ4"
          fi
          if patch -p1 -F 3 < 002-zstd.patch 2>/dev/null; then
            echo "✅ ZSTD 1.5.7 应用成功"
          else
            echo "⚠️ ZSTD patch 应用失败，回退到内核自带 ZSTD"
          fi

      - name: 应用 lz4kd 补丁
        if: inputs.lz4kd_enable
        run: |
          echo "正在添加lz4kd补丁…"
          cd kernel_workspace
          if [ ! -d "SukiSU_patch" ]; then
            git clone --depth=1 https://github.com/ShirkNeko/SukiSU_patch.git
          fi
          cd common
          cp -r ../SukiSU_patch/other/zram/lz4k/include/linux/* ./include/linux/
          cp -r ../SukiSU_patch/other/zram/lz4k/lib/* ./lib
          cp -r ../SukiSU_patch/other/zram/lz4k/crypto/* ./crypto
          cp ../SukiSU_patch/other/zram/zram_patch/${{ env.KERNEL_VERSION }}/lz4kd.patch ./
          patch -p1 -F 3 < lz4kd.patch || true

      - name: 配置核心扩展与通用优化
        run: |
          cd kernel_workspace
          DCFG="./common/arch/arm64/configs/gki_defconfig"

          if [[ "${{ github.event.inputs.susfs_enable }}" == "true" ]]; then
            cat >> $DCFG << 'SUSFSCFG'
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          SUSFSCFG
          else
            echo "CONFIG_KSU_SUSFS=n" >> $DCFG
          fi

          echo "CONFIG_KSU=y" >> $DCFG
          if [[ ${{ github.event.inputs.kpm_enable }} == 'builtin' ]] && ( [[ "${{ github.event.inputs.ksu_type }}" == "sukisu" ]] || [[ "${{ github.event.inputs.ksu_type }}" == "resukisu" ]] ); then
            echo "CONFIG_KPM=y" >> $DCFG
          fi
          echo "CONFIG_TMPFS_XATTR=y" >> $DCFG
          echo "CONFIG_TMPFS_POSIX_ACL=y" >> $DCFG
          
          if [[ "${{ github.event.inputs.lz4kd_enable }}" == "true" ]]; then
            cat >> $DCFG << 'LZ4KDCFG'
          CONFIG_ZSMALLOC=y
          CONFIG_CRYPTO_LZ4HC=y
          CONFIG_CRYPTO_LZ4K=y
          CONFIG_CRYPTO_LZ4KD=y
          CONFIG_CRYPTO_842=y
          LZ4KDCFG
          fi
          
          echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> $DCFG
          sed -i 's/check_defconfig//' ./common/build.config.gki
          echo "CONFIG_HEADERS_INSTALL=n" >> $DCFG

          echo 'CONFIG_ZRAM=y' >> $DCFG
          echo 'CONFIG_RANDOMIZE_KSTACK_OFFSET_DEFAULT=y' >> $DCFG
          cat >> $DCFG << 'TUNECFG'
          CONFIG_ZRAM_DEF_COMP_LZ4=y
          CONFIG_ZRAM_DEF_COMP="lz4"
          CONFIG_LRU_GEN=y
          CONFIG_LRU_GEN_ENABLED=y
          CONFIG_NET_SCH_CAKE=y
          CONFIG_SECURITY_LANDLOCK=y
          TUNECFG

          if [[ "${{ github.event.inputs.rcu_nocb_enable }}" == "true" ]]; then
            echo "⚠️ 正在开启 RCU_NOCB_CPU..."
            cat >> $DCFG << 'RCUCFG'
          CONFIG_RCU_EXPERT=y
          CONFIG_RCU_NOCB_CPU=y
          CONFIG_RCU_NOCB_CPU_DEFAULT_ALL=y
          RCUCFG
          echo 'CONFIG_RCU_LAZY_DEFAULT_OFF=n' >> ./common/arch/arm64/configs/gki_defconfig
          echo "  [+] RCU_LAZY 默认启用"
          echo 'CONFIG_RCU_BOOST_DELAY=300' >> ./common/arch/arm64/configs/gki_defconfig
          echo 'CONFIG_RCU_NOCB_CPU_CB_BOOST=y' >> ./common/arch/arm64/configs/gki_defconfig
          echo '  [+] RCU_BOOST_DELAY=300 + RCU_NOCB_CPU_CB_BOOST'
          fi

          cat >> $DCFG << 'NSCFG'
          CONFIG_UTS_NS=y
          CONFIG_USER_NS=y
          CONFIG_DEVTMPFS=y
          NSCFG

          # ★关键加固：强制注入原厂存活依赖符号，确保闭源驱动安全加载★
          echo ">>> 正在注入闭源 Vendor 驱动强依赖符号 (UBSAN / KUNIT)..."
          cat >> $DCFG << 'OEMDEPENDS'
          CONFIG_UBSAN=y
          CONFIG_UBSAN_TRAP=y
          CONFIG_CC_HAS_UBSAN_ARRAY_BOUNDS=y
          CONFIG_UBSAN_BOUNDS=y
          CONFIG_UBSAN_ARRAY_BOUNDS=y
          CONFIG_UBSAN_LOCAL_BOUNDS=y
          CONFIG_UBSAN_SANITIZE_ALL=y
          CONFIG_KUNIT=m
          CONFIG_KUNIT_DEBUGFS=y
          OEMDEPENDS
          
      - name: 自动定位并注入全能战神参数
        env:
          MY_FINAL_CMDLINE: >-
           schedstats=disable mitigations=off panic=10 nokaslr 
           page_alloc.shuffle=1 cryptomgr.notests 
           rcutree.blimit=1024 workqueue.power_efficient=1
        run: |
        # 🔍 智能雷达：在 configs 目录下递归寻找所有带有 defconfig 后缀的文件
        echo "正在扫描内核配置文件..."
    
        # 优先寻找常见的 gki_defconfig 或厂商定制 defconfig
          TARGET_FILE=$(find arch/arm64/configs/ -type f \( -name "gki_defconfig" -o -name "*_defconfig" -o -name "*defconfig" \) | head -n 1)
    
          if [ -z "$TARGET_FILE" ]; then
          echo "❌ 错误：在 arch/arm64/configs/ 及其子目录下未找到任何 defconfig 配置文件！"
          ls -R arch/arm64/configs/
          exit 1
          fi
    
          echo "🎯 成功锁定目标配置文件: $TARGET_FILE"
    
          # 彻底清理该文件中可能存在的旧静态 CMDLINE 行
          sed -i '/CONFIG_CMDLINE=/d' "$TARGET_FILE"
          sed -i '/CONFIG_CMDLINE_EXTEND=/d' "$TARGET_FILE"
    
          # 静态写入我们活体数据验证过的 9 大黄金 Buff
          echo "CONFIG_CMDLINE=\"${{ env.MY_FINAL_CMDLINE }}\"" >> "$TARGET_FILE"
          echo "CONFIG_CMDLINE_EXTEND=y" >> "$TARGET_FILE"
    
          echo "========================================="
          echo "✅ 黄金参数已成功洗入目标文件！"
          tail -n 5 "$TARGET_FILE"
          echo "========================================="
      - name: 启用网络功能增强优化配置
        if: inputs.better_net
        run: |
          cd kernel_workspace
          cat >> ./common/arch/arm64/configs/gki_defconfig << 'NETCFG'
          CONFIG_NF_CONNTRACK=y
          CONFIG_NF_NAT=y
          CONFIG_NF_NAT_MASQUERADE=y
          CONFIG_NF_NAT_REDIRECT=y
          CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
          CONFIG_IP6_NF_IPTABLES=y
          CONFIG_IP6_NF_FILTER=y
          CONFIG_IP6_NF_MANGLE=y
          CONFIG_IP6_NF_NAT=y
          CONFIG_IP6_NF_TARGET_MASQUERADE=y
          CONFIG_IP6_NF_TARGET_REDIRECT=y
          CONFIG_IP_NF_NAT=y
          CONFIG_IP_NF_TARGET_MASQUERADE=y
          CONFIG_IP_NF_TARGET_REDIRECT=y
          CONFIG_NF_TABLES=n
          CONFIG_BPF_STREAM_PARSER=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_SET=y
          CONFIG_IP_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          CONFIG_NET_SCH_FQ=y
          CONFIG_NET_SCH_PIE=y
          CONFIG_DEFAULT_FQ=y
          NETCFG
          cd common
          echo "[INFO] 尝试应用 vintf 兼容 config.patch..."
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/other_patch/config.patch
          if patch -p1 -F 3 --dry-run < config.patch 2>/dev/null; then
            patch -p1 -F 3 < config.patch
            echo "[INFO] config.patch 应用成功"
          else
            echo "[WARN] config.patch 无法干净应用，跳过。IPv6 NAT 功能不受影响。"
          fi

      - name: 添加 BBR 等一系列拥塞控制算法
        run: |
          if [[ "${{ github.event.inputs.bbr_enable }}" != "false" ]]; then
            echo "正在添加BBR等拥塞控制算法..."
            cd kernel_workspace
            cat >> ./common/arch/arm64/configs/gki_defconfig << 'BBRCFG'
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_TCP_CONG_CUBIC=y
          CONFIG_TCP_CONG_VEGAS=y
          CONFIG_TCP_CONG_NV=y
          CONFIG_TCP_CONG_WESTWOOD=y
          CONFIG_TCP_CONG_HTCP=y
          CONFIG_TCP_CONG_BRUTAL=y
          BBRCFG
            if [[ "${{ github.event.inputs.bbr_enable }}" == "default" ]]; then
              echo "正在将BBR设为默认拥塞控制算法..."
              echo "CONFIG_DEFAULT_TCP_CONG=bbr" >> ./common/arch/arm64/configs/gki_defconfig
            else
              echo "CONFIG_DEFAULT_TCP_CONG=cubic" >> ./common/arch/arm64/configs/gki_defconfig
            fi
          fi

      - name: 启用 Droidspaces 容器支持
        run: |
          if [[ "${{ github.event.inputs.droidspaces_enable }}" != "false" ]]; then
            echo "正在启用 Droidspaces 容器支持..."
            cd kernel_workspace/common
            wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/droidspaces_patch/fix_sysvipc_kabi_6_7_8.patch
            patch -p1 -F 3 < fix_sysvipc_kabi_6_7_8.patch || true
            wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/droidspaces_patch/fix_oplus_bsp_midas.patch
            patch -p1 -F 3 < fix_oplus_bsp_midas.patch || true
            wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/droidspaces_patch/ntsync_base.patch
            wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/droidspaces_patch/ntsync_compat_${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch
            patch -p1 -F 3 < ntsync_base.patch || true
            patch -p1 -F 3 < ntsync_compat_${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch || true
            cat >> ./arch/arm64/configs/gki_defconfig << 'DSCFG'
          CONFIG_PID_NS=y
          CONFIG_IPC_NS=y
          CONFIG_SYSVIPC=y
          CONFIG_DEVTMPFS=y
          CONFIG_NAMESPACES=y
          CONFIG_POSIX_MQUEUE=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_TARGET_LOG=y
          CONFIG_NETFILTER_XT_MATCH_RECENT=y
          CONFIG_NTSYNC=y
          DSCFG
            if [[ "${{ github.event.inputs.droidspaces_enable }}" == "extend" ]]; then
              echo "正在启用容器环境扩展支持..."
              echo "CONFIG_BT_HCIVHCI=y" >> ./arch/arm64/configs/gki_defconfig
              echo "CONFIG_STATIC_USERMODEHELPER=n" >> ./arch/arm64/configs/gki_defconfig
              wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/droidspaces_patch/evdi_drm.patch
              patch -p1 -F 3 < evdi_drm.patch || true
              echo "CONFIG_DRM_LINDROID_EVDI=y" >> ./arch/arm64/configs/gki_defconfig
            fi
          fi

      - name: 启用ADIOS IO调度器
        if: inputs.adios_enable
        run: |
          echo "正在启用ADIOS IO调度器…"
          cd kernel_workspace
          cat >> ./common/arch/arm64/configs/gki_defconfig << 'ADIOSCFG'
          CONFIG_MQ_IOSCHED_ADIOS=y
          CONFIG_MQ_IOSCHED_DEFAULT_ADIOS=y
          ADIOSCFG

      - name: 启用Re-Kernel支持
        if: inputs.rekernel_enable
        run: |
          echo "正在启用Re-Kernel支持…"
          cd kernel_workspace
          echo "CONFIG_REKERNEL=y" >> ./common/arch/arm64/configs/gki_defconfig

      - name: 启用物理级基带保护
        if: inputs.baseband_guard
        run: |
          echo "正在启用内核级基带保护…"
          cd kernel_workspace
          echo "CONFIG_BBG=y" >> ./common/arch/arm64/configs/gki_defconfig
          cd ./common
          curl -sSL https://github.com/cctv18/Baseband-guard/raw/master/setup.sh | bash
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig

      - name: 添加制作名称及固化版本信息
        run: |
          cd kernel_workspace
          echo "替换内核版本后缀并固化..."
          
          # 核心防护：强制锁死动态版本号，对齐正常开机环境配置
          echo "CONFIG_LOCALVERSION_AUTO=y" >> ./common/arch/arm64/configs/gki_defconfig

          if [[ -n "${{ github.event.inputs.kernel_suffix }}" ]]; then
            echo "当前内核版本后缀：${{ github.event.inputs.kernel_suffix }}"
            for f in ./common/scripts/setlocalversion; do
              sed -i "\$s|echo \"\\\$res\"|echo \"-${{ github.event.inputs.kernel_suffix }}\"|" "$f"
            done
            sed -i "s/-4k/-${{ github.event.inputs.kernel_suffix }}/g" ./common/arch/arm64/configs/gki_defconfig
          else
            echo "当前内核版本：6.6.${SUB_VERSION}-${UPSTREAM_TAG}"
            for f in ./common/scripts/setlocalversion; do
              sed -i "\$s|echo \"\\\$res\"|echo \"-${UPSTREAM_TAG}\"|" "$f"
            done
            sed -i "s/-4k/-${UPSTREAM_TAG}/g" ./common/arch/arm64/configs/gki_defconfig
          fi
          sed -i 's/${scm_version}//' ./common/scripts/setlocalversion

          echo "[+] HZ: 250 -> 1000"

      - name: 启用 HZ=1000 高精度调度
        if: inputs.hz_1000
        run: |
          echo ">>> 正在启用 HZ=1000 ..."
          cd kernel_workspace
          cat >> ./common/arch/arm64/configs/gki_defconfig << 'HZ1000CFG'
          # CONFIG_HZ_250 is not set
          CONFIG_HZ_1000=y
          CONFIG_HZ=1000
          HZ1000CFG
          echo "[+] HZ: 250 -> 1000"

      - name: 启用 BBRv3 TCP 拥塞控制
        if: inputs.bbrv3_enable
        run: |
          echo ">>> 正在下载并应用 BBRv3 补丁 ..."
          cd kernel_workspace/common
          # 【修复1】: 使用 -o 强制重命名下载的文件为 bbrv3.patch
          curl -sSL -o bbrv3.patch "https://raw.githubusercontent.com/WildKernels/kernel_patches/main/common/bbrv3/0001-net-tcp-backport-BBRv3-to-android15-6.6.patch"
          
          if git apply -p1 < bbrv3.patch 2>/dev/null; then
            echo "✅ BBRv3 git apply 成功"
          elif patch -p1 -F 3 < bbrv3.patch 2>/dev/null; then
            echo "✅ BBRv3 patch 成功"
          else
            echo "❌ BBRv3 补丁失败"
            exit 1
          fi
          
          # 【修复2】: 去除多余的 ./common/ 路径，因为当前已经在 common 目录下了
          echo "CONFIG_TCP_CONG_BBR3=y" >> ./arch/arm64/configs/gki_defconfig
          echo "CONFIG_DEFAULT_BBR3=y" >> ./arch/arm64/configs/gki_defconfig
          echo "[+] BBRv3 已加入编译"


      - name: 启用选择性 -O3 优化
        if: inputs.o3_selective
        run: |
          echo ">>> 正在启用选择性 -O3 ..."
          cd kernel_workspace/common
          echo 'subdir-ccflags-y += -O3' >> crypto/Makefile
          echo 'subdir-ccflags-y += -O3' >> lib/Makefile
          echo "[+] crypto/ + lib/ : -O2 -> -O3"

      - name: 构建内核 (生成配置文件与诊断检测)
        run: |
          WORKDIR="$(pwd)"
          export PATH="/usr/lib/ccache:$PATH"
          export PATH="$WORKDIR/kernel_workspace/clang18/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          
          echo "编译器信息:"
          CLANG_DIR="$WORKDIR/kernel_workspace/clang18/bin"
          echo "Clang版本: $($CLANG_DIR/clang --version | head -n 1)"
          echo "LLD版本: $($CLANG_DIR/ld.lld --version | head -n 1)"
          PAHOLE_VER=$(pahole --version 2>/dev/null | head -n1)
          [ -z "$PAHOLE_VER" ] && echo "pahole版本：未安装" || echo "pahole版本：$PAHOLE_VER"
          
          cd kernel_workspace/common
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" LD="ld.lld" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error gki_defconfig

          if [[ "${{ github.event.inputs.diagnosis }}" == "true" ]]; then
            echo ">>> 诊断模式已开启，正在导出 .config 文件..."
            cp out/.config out/build_config.txt
            echo "✅ 成功导出 build_config.txt，即将中断执行完整的内核编译环节。"
          fi

      - name: 上传诊断配置文本 (仅诊断模式)
        if: inputs.diagnosis
        uses: actions/upload-artifact@v7
        with:
          name: kernel-config-${{ github.run_id }}
          if-no-files-found: warn
          path: kernel_workspace/common/out/build_config.txt

      - name: 编译完整内核镜像
        if: ${{ !inputs.diagnosis }}
        run: |
          WORKDIR="$(pwd)"
          export PATH="/usr/lib/ccache:$PATH"
          export PATH="$WORKDIR/kernel_workspace/clang18/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          export CCACHE_LOGFILE="${{ github.workspace }}/kernel_workspace/ccache.log"
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_SLOPPINESS="file_stat_matches,include_file_mtime,include_file_ctime,time_macros"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_NOHARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="${{ env.CCACHE_MAXSIZE }}"
          export CCACHE_IS_KERNEL_COMPILING="true"

          cd kernel_workspace/common

          echo ">>> 清理磁盘空间..."
          sudo rm -rf /usr/share/dotnet &
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /opt/ghc &
          sudo rm -rf /opt/hostedtoolcache/CodeQL &
          wait
          echo ">>> 磁盘清理完成"

          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/libfakestat.so
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/libfaketimeMT.so
          chmod 777 ./*.so
          export FAKESTAT="2025-05-25 12:00:00"
          export FAKETIME="@2025-05-25 13:00:00"
          
          SO_DIR=$(pwd)
          export PRELOAD_LIBS="$SO_DIR/libfakestat.so $SO_DIR/libfaketimeMT.so"
          echo '#!/bin/bash' > cc-wrapper
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> cc-wrapper
          echo 'export FAKESTAT="'$FAKESTAT'"' >> cc-wrapper
          echo 'export FAKETIME="'$FAKETIME'"' >> cc-wrapper
          echo 'ccache clang "$@"' >> cc-wrapper
          echo '#!/bin/bash' > ld-wrapper
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> ld-wrapper
          echo 'export FAKESTAT="'$FAKESTAT'"' >> ld-wrapper
          echo 'export FAKETIME="'$FAKETIME'"' >> ld-wrapper
          echo 'ld.lld "$@"' >> ld-wrapper

          chmod +x cc-wrapper ld-wrapper
          
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="$(pwd)/cc-wrapper" LD="$(pwd)/ld-wrapper" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error Image

          echo "内核编译完成！"
          echo "========== LZ4 NEON ASM 验证 =========="
          if nm out/vmlinux 2>/dev/null | grep -q "_lz4_decompress_asm"; then
            echo "✅ _lz4_decompress_asm 已编译 — ARM64 NEON 加速生效"
          else
            echo "⚠️ _lz4_decompress_asm 未找到 — 使用内核自带 LZ4"
          fi
          echo "========================================="
          echo "========== IP6_NF_NAT 诊断 =========="
          grep "CONFIG_IP6_NF_NAT" out/.config 2>/dev/null || echo "(未设置)"
          echo "========================================="
          echo "ccache状态："
          ccache -s

      - name: 保存新的 ccache 缓存
        if: (inputs.ccache_update || steps.ccache-restore.outputs.cache-hit != 'true') && ${{ !inputs.diagnosis }}
        uses: actions/cache/save@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ env.CCACHE_REAL_KEY }}-${{ runner.os }}-${{ github.ref_name }}

      - name: 应用KPM并修补内核
        if: ${{ !inputs.diagnosis }}
        run: |
          if [[ ${{ github.event.inputs.kpm_enable }} == 'builtin' ]] && ( [[ "${{ github.event.inputs.ksu_type }}" == "sukisu" ]] || [[ "${{ github.event.inputs.ksu_type }}" == "resukisu" ]] ); then
            echo "正在应用KPM并修补内核..."
            cd kernel_workspace/common/out/arch/arm64/boot
            curl -fSLo patch_linux https://github.com/SukiSU-Ultra/SukiSU_KernelPatch_patch/releases/latest/download/patch_linux || {
              echo "❌ KPM patch_linux 下载失败"
              exit 1
            }
            chmod +x patch_linux
            ./patch_linux
            rm -f Image
            mv oImage Image
          fi
          if [[ ${{ github.event.inputs.kpm_enable }} == 'kpn' ]]; then
            echo "正在应用KP-N并修补内核..."
            cd kernel_workspace/common/out/arch/arm64/boot
            wget https://github.com/KernelSU-Next/KPatch-Next/releases/latest/download/kptools-linux || {
              echo "❌ KPN kptools 下载失败"
              exit 1
            }
            wget https://github.com/KernelSU-Next/KPatch-Next/releases/latest/download/kpimg-linux || {
              echo "❌ KPN kpimg 下载失败"
              exit 1
            }
            chmod +x ./kptools-linux
            ./kptools-linux -p -i ./Image -k ./kpimg-linux -o ./oImage
            rm -f Image
            mv oImage Image
          fi

      - name: 克隆 AnyKernel3 并打包
        if: ${{ !inputs.diagnosis }}
        id: create_zip
        run: |
          cd kernel_workspace
          git clone https://github.com/cctv18/AnyKernel3 --depth=1
          rm -rf ./AnyKernel3/.git
          cd AnyKernel3
          cp ../common/out/arch/arm64/boot/Image ./Image
          if [[ ! -f ./Image ]]; then
            echo "未找到内核镜像文件，构建出错"
            exit 1
          fi
          
          if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            KSU_TYPENAME="SukiSU"
          elif [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]]; then
            KSU_TYPENAME="ReSukiSU"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then
            KSU_TYPENAME="KSUNext"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            KSU_TYPENAME="KSU"
          else
            KSU_TYPENAME="none"
          fi

          if [[ "${{ github.event.inputs.lz4kd_enable }}" == "true" ]]; then
            wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/zram.zip
          fi
          if [[ ${{ github.event.inputs.kpm_enable }} == 'kpn' ]]; then
            wget https://github.com/cctv18/KPatch-Next/releases/latest/download/kpn.zip
          fi

          if [[ -n "${{ github.event.inputs.kernel_suffix }}" ]]; then
            AK3_NAME=AnyKernel3_${KSU_TYPENAME}_${{ env.KSUVER }}_${{ env.KERNEL_VERSION }}_${{ github.event.inputs.kernel_suffix }}.zip
            FULL_VERSION=${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}-${{ github.event.inputs.kernel_suffix }}
          else
            AK3_NAME=AnyKernel3_${KSU_TYPENAME}_${{ env.KSUVER }}_${{ env.KERNEL_VERSION }}_${{ env.KERNEL_NAME }}.zip
            FULL_VERSION=${{ env.KERNEL_VERSION }}.${{ env.SUB_VERSION }}-${{ env.KERNEL_NAME }}
          fi
          zip -r ../$AK3_NAME ./*
          echo "ak3name=$AK3_NAME" >> $GITHUB_OUTPUT

          TIME_NOW="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          echo "Author: $GITHUB_ACTOR" > ./ak3.log
          echo "Repo: $GITHUB_REPOSITORY" >> ./ak3.log
          echo "Branch: $GITHUB_REF_NAME" >> ./ak3.log
          echo "Run ID: $GITHUB_RUN_ID" >> ./ak3.log
          echo "Commit: $GITHUB_SHA" >> ./ak3.log
          echo "Time: $TIME_NOW" >> ./ak3.log
          echo "Kernel Ver: $FULL_VERSION" >> ./ak3.log
          echo "KSU Branch: ${KSU_TYPENAME}" >> ./ak3.log
          echo "KSU Ver: ${KSUVER}" >> ./ak3.log
          echo "susfs: ${{ github.event.inputs.susfs_enable }}" >> ./ak3.log
          echo "KPM: ${{ github.event.inputs.kpm_enable }}" >> ./ak3.log
          echo "LZ4: ${{ github.event.inputs.lz4_enable }}" >> ./ak3.log
          echo "LZ4KD: ${{ github.event.inputs.lz4kd_enable }}" >> ./ak3.log
          echo "IPset: ${{ github.event.inputs.better_net }}" >> ./ak3.log
          echo "BBR&Brutal: ${{ github.event.inputs.bbr_enable }}" >> ./ak3.log
          echo "Droidspaces: ${{ github.event.inputs.droidspaces_enable }}" >> ./ak3.log
          echo "ADIOS: ${{ github.event.inputs.adios_enable }}" >> ./ak3.log
          echo "Re-Kernel: ${{ github.event.inputs.rekernel_enable }}" >> ./ak3.log
          echo "BBG: ${{ github.event.inputs.baseband_guard }}" >> ./ak3.log
          echo "RCU_NOCB: ${{ github.event.inputs.rcu_nocb_enable }}" >> ./ak3.log
          
          zip -z ../$AK3_NAME < ./ak3.log

      - name: 上传 Ccache 调试日志
        if: always() && inputs.ccache_debug && ${{ !inputs.diagnosis }}
        uses: actions/upload-artifact@v7
        with:
          name: ccache-debug-log
          path: ${{ github.workspace }}/kernel_workspace/ccache.log
          archive: true

      - name: 上传 ZIP 工件
        if: ${{ !inputs.diagnosis }}
        uses: actions/upload-artifact@v7
        with:
          path: ${{ github.workspace }}/kernel_workspace/AnyKernel*.zip
          archive: false

  release:
    needs: build
    if: ${{ !inputs.diagnosis }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: read

    steps:
      - name: 下载 ZIP 工件
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.ak3name }}
          path: ./release_zips
          skip-decompress: true

      - name: 设置环境变量
        run: |
          if [[ -n "${{ github.event.inputs.kernel_suffix }}" ]]; then
            FULL_VERSION=${{ env.KERNEL_VERSION }}.${{ needs.build.outputs.sub_version }}-${{ github.event.inputs.kernel_suffix }}
            echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV
          else
            FULL_VERSION=${{ env.KERNEL_VERSION }}.${{ needs.build.outputs.sub_version }}-${{ needs.build.outputs.kernel_name }}
            echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV
          fi
          
          TIME="$(TZ='Asia/Shanghai' date +'%y%m%d%H%M%S')"
          echo "TIME=$TIME" >> $GITHUB_ENV
          TAG_HEAD="OPPO-OPlus-Realme-build"
          echo "TAG_HEAD=$TAG_HEAD" >> $GITHUB_ENV
          
          if [[ "${{ github.event.inputs.upstream_merge }}" == "true" ]]; then
            UPSTREAM_NOTE="上游补丁：已合并 kernel.org stable 最新 6.6 tag"
          else
            UPSTREAM_NOTE="上游补丁：未合并（使用 OEM 纯净 6.6.89）"
          fi
          echo "UPSTREAM_NOTE=$UPSTREAM_NOTE" >> $GITHUB_ENV

          if [[ ${{ github.event.inputs.ksu_type }} == "sukisu" ]]; then
            KSU_TYPENAME="SukiSU Ultra"
          elif [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]]; then
            KSU_TYPENAME="ReSukiSU"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksunext" ]]; then
            KSU_TYPENAME="KernelSU Next"
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            KSU_TYPENAME="KSU"
          else
            KSU_TYPENAME="无内置KSU"
          fi
          echo "KSU_TYPENAME=$KSU_TYPENAME" >> $GITHUB_ENV

      - name: 创建发布
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_NOTE="${{ env.UPSTREAM_NOTE }}"
          
          cat << 'EOF' > release_notes.md
          ### 📱 ${{ env.KSU_TYPENAME }} | 骁龙8Elite | ${{ env.KERNEL_VERSION }}.${{ needs.build.outputs.sub_version }}

          ${{ env.UPSTREAM_NOTE }}

          | 功能 | 状态 |
          |------|:--:|
          | KSU | ${{ env.KSU_TYPENAME }} (${{ needs.build.outputs.ksuver }}) |
          | SUSFS | ${{ github.event.inputs.susfs_enable }} |
          | KPM | ${{ github.event.inputs.kpm_enable }} |
          | LZ4 | ${{ github.event.inputs.lz4_enable }} |
          | LZ4KD | ${{ github.event.inputs.lz4kd_enable }} |
          | BBR/Brutal | ${{ github.event.inputs.bbr_enable }} |
          | 网络增强 | ${{ github.event.inputs.better_net }} |
          | Droidspaces | ${{ github.event.inputs.droidspaces_enable }} |
          | ADIOS | ${{ github.event.inputs.adios_enable }} |
          | Re-Kernel | ${{ github.event.inputs.rekernel_enable }} |
          | 基带保护 | ${{ github.event.inputs.baseband_guard }} |
          | RCU_NOCB | ${{ github.event.inputs.rcu_nocb_enable }} |

          **刷入前请备份 boot 分区。**
          EOF

          gh release create "${{ env.TAG_HEAD }}-${{ env.TIME }}" \
            --repo "${{ github.repository }}" \
            --title "${{ env.TAG_HEAD }}-${{ env.FULL_VERSION }}" \
            --notes-file release_notes.md \
            release_zips/AnyKernel3_*.zip
